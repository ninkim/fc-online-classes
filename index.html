<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FC 온라인 전체 클래스 도감</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0e17;
    --card-bg: #121829;
    --card-border: #1e2a45;
    --accent: #00b4ff;
    --accent-glow: rgba(0, 180, 255, 0.3);
    --gold: #ffd700;
    --text: #e0e6f0;
    --text-dim: #7a8ba8;
    --category-icon: #1a2540;
    --category-hero: #3a1a1a;
    --category-toty: #2a1a3a;
    --category-tots: #1a3a2a;
    --category-ucl: #0f1a3a;
    --category-special: #2a2a1a;
    --category-ng: #1a2a2a;
    --category-korea: #3a1a2a;
    --category-kleague: #1a3a1a;
    --category-pl: #2a1a2a;
    --category-live: #1a1a2a;
    --category-ambassador: #2a2a2a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .bg-particles {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(0,100,255,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(100,0,255,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(0,180,255,0.03) 0%, transparent 70%);
  }

  header {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 60px 20px 30px;
    background: linear-gradient(180deg, rgba(0,40,80,0.4) 0%, transparent 100%);
  }

  header h1 {
    font-size: 2.8rem;
    font-weight: 900;
    background: linear-gradient(135deg, #fff 0%, #00b4ff 50%, #7b61ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -1px;
    margin-bottom: 10px;
  }

  header p {
    color: var(--text-dim);
    font-size: 1rem;
    font-weight: 300;
  }

  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-top: 25px;
    flex-wrap: wrap;
  }

  .stat-item {
    text-align: center;
  }

  .stat-item .num {
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--accent);
  }

  .stat-item .label {
    font-size: 0.8rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .search-area {
    position: relative;
    z-index: 1;
    max-width: 600px;
    margin: 30px auto 10px;
    padding: 0 20px;
  }

  .search-area input {
    width: 100%;
    padding: 14px 20px 14px 50px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    color: var(--text);
    font-size: 1rem;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  .search-area input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .search-area input::placeholder { color: var(--text-dim); }

  .search-area .search-icon {
    position: absolute;
    left: 36px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 1.1rem;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px;
  }

  .category {
    margin-bottom: 50px;
  }

  .category-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--card-border);
  }

  .category-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .category-header h2 {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .category-header .count {
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-left: 8px;
    font-weight: 400;
  }

  .class-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
    gap: 14px;
  }

  .class-card {
    position: relative;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 20px 14px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    overflow: hidden;
  }

  .class-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: radial-gradient(circle at 50% 0%, rgba(0,180,255,0.08) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .class-card:hover {
    transform: translateY(-6px);
    border-color: var(--accent);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 20px var(--accent-glow);
  }

  .class-card:hover::before { opacity: 1; }

  .class-card img {
    width: 80px;
    height: auto;
    margin-bottom: 10px;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
    transition: transform 0.3s;
    position: relative;
    z-index: 1;
  }

  .class-card:hover img {
    transform: scale(1.12);
  }

  .class-card .class-name {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
    position: relative;
    z-index: 1;
  }

  .class-card .class-full {
    font-size: 0.7rem;
    color: var(--text-dim);
    position: relative;
    z-index: 1;
    line-height: 1.3;
  }

  .tooltip {
    position: absolute;
    bottom: calc(100% + 12px);
    left: 50%;
    transform: translateX(-50%) scale(0.9);
    background: #1a2340;
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 16px 18px;
    width: 280px;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 15px var(--accent-glow);
    text-align: left;
  }

  .tooltip::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 8px solid transparent;
    border-top-color: var(--accent);
  }

  .class-card:hover .tooltip {
    opacity: 1;
    transform: translateX(-50%) scale(1);
    pointer-events: auto;
  }

  .tooltip .tt-name {
    font-size: 1rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 4px;
  }

  .tooltip .tt-full {
    font-size: 0.78rem;
    color: var(--accent);
    margin-bottom: 8px;
    font-weight: 500;
  }

  .tooltip .tt-desc {
    font-size: 0.8rem;
    color: #b0bcd4;
    line-height: 1.6;
  }

  .tooltip .tt-id {
    font-size: 0.7rem;
    color: var(--text-dim);
    margin-top: 8px;
    padding-top: 6px;
    border-top: 1px solid rgba(255,255,255,0.08);
  }

  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-size: 1.1rem;
    display: none;
  }

  @media (max-width: 768px) {
    header h1 { font-size: 1.8rem; }
    .class-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
    .class-card img { width: 60px; }
    .class-card { padding: 14px 10px 12px; }
    .tooltip { width: 240px; padding: 12px 14px; }
    .stats-bar { gap: 24px; }

    .class-card:hover .tooltip {
      position: fixed;
      bottom: auto;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(1);
      width: 85vw;
      max-width: 320px;
    }
  }

  .hidden { display: none !important; }

  .category.hidden-cat { display: none; }
</style>
</head>

  {key:"live", name:"LIVE (라이브)", color:"#4cc9f0", bg:"var(--category-live)"}
];

function render(filter = "") {
  const container = document.getElementById("classContainer");
  const noResults = document.getElementById("noResults");
  container.innerHTML = "";
  let totalVisible = 0;
  let visibleCats = 0;

  CATEGORIES.forEach(cat => {
    const items = CLASS_DATA.filter(c => {
      if (c.cat !== cat.key) return false;
      if (!filter) return true;
      const q = filter.toLowerCase();
      return c.name.toLowerCase().includes(q) || c.full.toLowerCase().includes(q) || c.desc.toLowerCase().includes(q);
    });

    if (items.length === 0) return;
    visibleCats++;
    totalVisible += items.length;

    const section = document.createElement("div");
    section.className = "category";
    section.innerHTML = `
      <div class="category-header">
        <div class="category-dot" style="background:${cat.color};box-shadow:0 0 8px ${cat.color}"></div>
        <h2>${cat.name}<span class="count">${items.length}개</span></h2>
      </div>
      <div class="class-grid">
        ${items.map(c => `
          <div class="class-card">
            <img src="${c.img}" alt="${c.name}" loading="lazy" onerror="this.style.opacity='0.3'">
            <div class="class-name">${c.name}</div>
            <div class="class-full">${c.full}</div>
            <div class="tooltip">
              <div class="tt-name">${c.name}</div>
              <div class="tt-full">${c.full}</div>
              <div class="tt-desc">${c.desc}</div>
              <div class="tt-id">Season ID: ${c.id}</div>
            </div>
          </div>
        `).join("")}
      </div>
    `;
    container.appendChild(section);
  });

  document.getElementById("totalCount").textContent = filter ? totalVisible : CLASS_DATA.length;
  document.getElementById("catCount").textContent = filter ? visibleCats : CATEGORIES.length;
  noResults.style.display = totalVisible === 0 ? "block" : "none";
}

document.getElementById("searchInput").addEventListener("input", e => {
  render(e.target.value.trim());
});

render();
