<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FC 온라인 전체 클래스 도감</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0e17;
    --card-bg: #121829;
    --card-border: #1e2a45;
    --accent: #00b4ff;
    --accent-glow: rgba(0, 180, 255, 0.3);
    --gold: #ffd700;
    --text: #e0e6f0;
    --text-dim: #7a8ba8;
    --category-icon: #1a2540;
    --category-hero: #3a1a1a;
    --category-toty: #2a1a3a;
    --category-tots: #1a3a2a;
    --category-ucl: #0f1a3a;
    --category-special: #2a2a1a;
    --category-ng: #1a2a2a;
    --category-korea: #3a1a2a;
    --category-kleague: #1a3a1a;
    --category-pl: #2a1a2a;
    --category-live: #1a1a2a;
    --category-ambassador: #2a2a2a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .bg-particles {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(0,100,255,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(100,0,255,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(0,180,255,0.03) 0%, transparent 70%);
  }

  header {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 60px 20px 30px;
    background: linear-gradient(180deg, rgba(0,40,80,0.4) 0%, transparent 100%);
  }

  header h1 {
    font-size: 2.8rem;
    font-weight: 900;
    background: linear-gradient(135deg, #fff 0%, #00b4ff 50%, #7b61ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -1px;
    margin-bottom: 10px;
  }

  header p {
    color: var(--text-dim);
    font-size: 1rem;
    font-weight: 300;
  }

  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-top: 25px;
    flex-wrap: wrap;
  }

  .stat-item {
    text-align: center;
  }

  .stat-item .num {
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--accent);
  }

  .stat-item .label {
    font-size: 0.8rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .search-area {
    position: relative;
    z-index: 1;
    max-width: 600px;
    margin: 30px auto 10px;
    padding: 0 20px;
  }

  .search-area input {
    width: 100%;
    padding: 14px 20px 14px 50px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    color: var(--text);
    font-size: 1rem;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  .search-area input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .search-area input::placeholder { color: var(--text-dim); }

  .search-area .search-icon {
    position: absolute;
    left: 36px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 1.1rem;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px;
  }

  .category {
    margin-bottom: 50px;
  }

  .category-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--card-border);
  }

  .category-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .category-header h2 {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .category-header .count {
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-left: 8px;
    font-weight: 400;
  }

  .class-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
    gap: 14px;
  }

  .class-card {
    position: relative;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 20px 14px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    overflow: hidden;
  }

  .class-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: radial-gradient(circle at 50% 0%, rgba(0,180,255,0.08) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .class-card:hover {
    transform: translateY(-6px);
    border-color: var(--accent);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 20px var(--accent-glow);
  }

  .class-card:active {
    transform: translateY(-2px) scale(0.97);
    transition: transform 0.1s;
  }

  .class-card:hover::before { opacity: 1; }

  .class-card img {
    width: 80px;
    height: auto;
    margin-bottom: 10px;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
    transition: transform 0.3s;
    position: relative;
    z-index: 1;
  }

  .class-card:hover img {
    transform: scale(1.12);
  }

  .class-card .class-name {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
    position: relative;
    z-index: 1;
  }

  .class-card .class-full {
    font-size: 0.7rem;
    color: var(--text-dim);
    position: relative;
    z-index: 1;
    line-height: 1.3;
  }

  .modal-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    padding: 20px;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: auto;
  }

  .modal-content {
    background: linear-gradient(160deg, #131b30 0%, #0e1525 100%);
    border: 1px solid var(--accent);
    border-radius: 18px;
    max-width: 440px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 30px var(--accent-glow);
    transform: scale(0.9) translateY(20px);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .modal-overlay.open .modal-content {
    transform: scale(1) translateY(0);
  }

  .modal-header {
    position: relative;
    text-align: center;
    padding: 32px 24px 20px;
    background: radial-gradient(ellipse at 50% 0%, rgba(0,180,255,0.1) 0%, transparent 70%);
  }

  .modal-close {
    position: absolute;
    top: 14px; right: 16px;
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 1px solid var(--card-border);
    background: rgba(255,255,255,0.05);
    color: var(--text-dim);
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .modal-close:hover {
    background: rgba(255,80,80,0.2);
    border-color: #ff5050;
    color: #ff5050;
  }

  .modal-img {
    width: 120px;
    height: auto;
    filter: drop-shadow(0 4px 20px rgba(0,180,255,0.3));
    margin-bottom: 16px;
  }

  .modal-name {
    font-size: 1.4rem;
    font-weight: 800;
    color: #fff;
    margin-bottom: 4px;
  }

  .modal-full {
    font-size: 0.9rem;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 6px;
  }

  .modal-date {
    font-size: 0.78rem;
    color: var(--text-dim);
  }

  .modal-body {
    padding: 0 24px 28px;
  }

  .modal-desc {
    font-size: 0.92rem;
    color: #c0cce0;
    line-height: 1.8;
    padding: 18px;
    background: rgba(255,255,255,0.03);
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.05);
    margin-bottom: 16px;
  }

  .modal-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    background: rgba(0,180,255,0.06);
    border-radius: 10px;
    border: 1px solid rgba(0,180,255,0.1);
  }

  .modal-meta-item {
    text-align: center;
  }

  .modal-meta-label {
    font-size: 0.65rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 3px;
  }

  .modal-meta-value {
    font-size: 0.85rem;
    color: var(--text);
    font-weight: 600;
  }

  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-size: 1.1rem;
    display: none;
  }

  @media (max-width: 768px) {
    header h1 { font-size: 1.8rem; }
    .class-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
    .class-card img { width: 60px; }
    .class-card { padding: 14px 10px 12px; }
    .stats-bar { gap: 24px; }
    .modal-content { max-width: 95vw; }
    .modal-img { width: 90px; }
    .modal-name { font-size: 1.2rem; }
    .modal-desc { font-size: 0.85rem; padding: 14px; }
  }

  .hidden { display: none !important; }

  .category.hidden-cat { display: none; }

  .sort-tabs {
    position: relative;
    z-index: 1;
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 18px auto 0;
    padding: 0 20px;
    max-width: 600px;
  }

  .sort-tab {
    padding: 9px 22px;
    border-radius: 20px;
    border: 1px solid var(--card-border);
    background: var(--card-bg);
    color: var(--text-dim);
    font-size: 0.88rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s;
    font-family: 'Noto Sans KR', sans-serif;
  }

  .sort-tab:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  .sort-tab.active {
    background: linear-gradient(135deg, rgba(0,180,255,0.2), rgba(123,97,255,0.2));
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 0 12px var(--accent-glow);
  }

  .new-badge {
    display: inline-block;
    background: linear-gradient(135deg, #ff3366, #ff6b35);
    color: #fff;
    font-size: 0.6rem;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 8px;
    margin-left: 6px;
    letter-spacing: 0.5px;
    vertical-align: middle;
    animation: newPulse 2s ease-in-out infinite;
    position: relative;
    z-index: 1;
  }

  @keyframes newPulse {
    0%, 100% { box-shadow: 0 0 6px rgba(255,51,102,0.4); }
    50% { box-shadow: 0 0 14px rgba(255,51,102,0.7); }
  }

  .class-date {
    font-size: 0.65rem;
    color: var(--text-dim);
    margin-top: 3px;
    position: relative;
    z-index: 1;
    opacity: 0.7;
  }

  .update-banner {
    position: relative;
    z-index: 1;
    max-width: 600px;
    margin: 12px auto 0;
    padding: 10px 18px;
    background: linear-gradient(135deg, rgba(0,180,255,0.12), rgba(123,97,255,0.12));
    border: 1px solid rgba(0,180,255,0.3);
    border-radius: 10px;
    color: var(--accent);
    font-size: 0.85rem;
    text-align: center;
    display: none;
    animation: fadeSlideIn 0.5s ease;
  }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .date-sort-section {
    margin-bottom: 50px;
  }

  .date-sort-section .date-group-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--card-border);
  }

  .date-group-header h2 {
    font-size: 1.2rem;
    font-weight: 600;
    color: var(--text);
  }

  .date-group-header .group-count {
    font-size: 0.82rem;
    color: var(--text-dim);
    font-weight: 400;
  }


  @media (max-width: 768px) {
    .sort-tabs { gap: 6px; }
    .sort-tab { padding: 7px 14px; font-size: 0.8rem; }
  }
</style>
</head>
<body>
<div class="bg-particles"></div>

<header>
  <h1>FC ONLINE CLASS GUIDE</h1>
  <p>EA SPORTS FC 온라인 전체 클래스 도감 - 마우스를 올려 상세 정보를 확인하세요</p>
  <div class="stats-bar">
    <div class="stat-item"><div class="num" id="totalCount">0</div><div class="label">전체 클래스</div></div>
    <div class="stat-item"><div class="num" id="catCount">0</div><div class="label">카테고리</div></div>
  </div>
</header>

<div class="search-area">
  <span class="search-icon">&#128269;</span>
  <input type="text" id="searchInput" placeholder="클래스명을 검색하세요 (예: ICON, TOTY, LIVE ...)">
</div>

<div class="sort-tabs">
  <button class="sort-tab active" data-sort="category">카테고리별</button>
  <button class="sort-tab" data-sort="date">출시일순</button>
</div>

<div class="update-banner" id="updateBanner"></div>

<div class="container" id="classContainer"></div>
<div class="no-results" id="noResults">검색 결과가 없습니다.</div>

<div class="modal-overlay" id="detailModal">
  <div class="modal-content">
    <div class="modal-header">
      <button class="modal-close" id="modalClose">&times;</button>
      <img class="modal-img" id="modalImg" src="" alt="">
      <div class="modal-name" id="modalName"></div>
      <div class="modal-full" id="modalFull"></div>
      <div class="modal-date" id="modalDate"></div>
    </div>
    <div class="modal-body">
      <div class="modal-desc" id="modalDesc"></div>
      <div class="modal-meta">
        <div class="modal-meta-item">
          <div class="modal-meta-label">Season ID</div>
          <div class="modal-meta-value" id="modalId"></div>
        </div>
        <div class="modal-meta-item">
          <div class="modal-meta-label">카테고리</div>
          <div class="modal-meta-value" id="modalCat"></div>
        </div>
        <div class="modal-meta-item">
          <div class="modal-meta-label">출시일</div>
          <div class="modal-meta-value" id="modalDateMeta"></div>
        </div>
      </div>
    </div>
  </div>
</div>

  {id:829,name:"GRU",full:"Greatest Runner-Ups",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/gru.png",cat:"special",desc:"결승전에서 아쉽게 준우승에 머문 선수들로 구성된 그레이티스트 러너업 클래스. 우승 직전까지 갔던 선수들의 아쉬움과 투혼을 기리는 테마이다."},
  {id:828,name:"BLD",full:"Best Legends",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/bld.png",cat:"special",desc:"각 클럽의 역대 최고 레전드들만 엄선한 베스트 레전드 클래스. 클럽 역사상 가장 위대한 선수들로 구성되며 ICON에 버금가는 프리미엄 능력치를 가진다."},
  {id:827,name:"BDO",full:"Ballon d'Or",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/bdo.png",cat:"special",desc:"발롱도르 수상자 및 후보 선수들로 구성된 클래스. 세계 최고의 선수에게 수여되는 발롱도르의 영예를 반영한 최상위급 능력치가 부여된다."},
  {id:826,name:"24EP",full:"2024 Energetic Player",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/24ep.png",cat:"special",desc:"해당 시즌 가장 활발하고 에너지 넘치는 활약을 보인 선수들로 구성된 에너제틱 플레이어 클래스. 높은 활동량과 적극성이 능력치에 반영된다."},
  {id:825,name:"CU",full:"Champions of Europe",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/cu.png",cat:"special",desc:"UEFA 챔피언스 리그 우승 경험이 있는 선수들로 구성된 챔피언스 오브 유럽 클래스. 유럽 최고 클럽 대항전의 우승 주역들이 포함된다."},
  {id:821,name:"MDL",full:"Medalist",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/mdl.png",cat:"special",desc:"올림픽 등 국제 종합 스포츠 대회에서 메달을 획득한 선수들로 구성된 메달리스트 클래스. 국가를 대표해 메달을 따낸 영광의 순간이 반영된다."},
  {id:815,name:"EU24",full:"UEFA EURO 2024",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/eu24.png",cat:"special",desc:"2024 UEFA 유로 대회에 참가한 선수들로 구성된 클래스. 유로 2024 본선 성적에 따라 OVR이 변동되는 라이브 시스템이 적용되었다."},
  {id:818,name:"LD",full:"Last Dance",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/ld.png",cat:"special",desc:"은퇴를 앞둔 선수들의 마지막 시즌 활약을 기리는 라스트 댄스 클래스. 선수 커리어의 마지막 빛나는 순간을 테마로 프리미엄 능력치가 부여된다."},
  {id:814,name:"UT",full:"Unexpected Transfer",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/ut.png",cat:"special",desc:"예상치 못한 깜짝 이적으로 화제가 된 선수들로 구성된 언익스펙티드 트랜스퍼 클래스. 이적 당시의 충격과 기대감을 반영한 능력치가 부여된다."},
  {id:813,name:"JNM",full:"Journeyman",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/jnm.png",cat:"special",desc:"여러 클럽을 거치며 다양한 리그 경험을 쌓은 저니맨 선수들로 구성된 클래스. 4개 이상의 구단에서 활약한 떠돌이 용병들의 다채로운 커리어를 조명한다."},
  {id:802,name:"DC",full:"Decade",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/dc.png",cat:"special",desc:"한 클럽에서 10년 이상 활약한 선수들로 구성된 디케이드 클래스. 장기간 한 팀에 헌신한 원클럽맨들의 충성심과 전성기 능력치를 기리는 테마이다."},
  {id:289,name:"CC",full:"CenturyClub",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/cc.png",cat:"special",desc:"국가대표로서 A매치 100경기 이상 출전한 센추리 클럽 멤버 선수들로 구성된 클래스. FIFA 센추리 클럽에 등재된 선수들의 국가 대표 경력을 기리는 테마이다."},
  {id:283,name:"HG",full:"Home Grown",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/hg.png",cat:"special",desc:"유소년 아카데미 출신으로 1군까지 성장한 홈 그로운 선수들로 구성된 클래스. 한 클럽의 유스 시스템에서 자란 충성스러운 선수들을 조명한다."},
  {id:284,name:"RTN",full:"Returnees",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/rtn.png",cat:"special",desc:"과거 은퇴했거나 라이선스 리그를 떠났다가 다시 복귀한 선수들로 구성된 리터니스 클래스. 컴백의 감동을 테마로 한 특별 능력치가 부여된다."},
  {id:272,name:"BWC",full:"Best of World Cup",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/bwc.png",cat:"special",desc:"FIFA 월드컵 역사상 최고의 활약을 보인 선수들로 구성된 클래스. 월드컵 통산 최다골, 최우수선수 등 월드컵 역대 레전드들이 포함된다."},
  {id:273,name:"WC22",full:"World Cup 2022",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/wc22.png",cat:"special",desc:"2022 카타르 FIFA 월드컵에 참가한 선수들로 구성된 클래스. 월드컵 본선 성적에 따라 OVR이 변동되는 라이브 시스템이 적용되었다."},
  {id:270,name:"SPL",full:"Spotlight",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/spl.png",cat:"special",desc:"주목받는 활약을 펼친 선수들을 스포트라이트 테마로 조명하는 클래스. 특정 시즌이나 대회에서 눈부신 활약을 보인 선수들에게 프리미엄 능력치가 부여된다."},
  {id:268,name:"LN",full:"LEGENDARY NUMBERS",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/ln.png",cat:"special",desc:"각 클럽에서 전설적인 등번호를 달고 활약한 선수들로 구성된 클래스. 10번, 7번 등 상징적인 등번호의 주인공들이 해당 시절의 전성기 능력치로 출시된다."},
  {id:265,name:"LOL",full:"LEGEND OF THE LOAN",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/lol.png",cat:"special",desc:"임대 기간 중 활약한 선수들로 구성된 클래스. 원 소속팀이 아닌 임대 구단에서 빛을 발했던 선수들의 임대 시절 퍼포먼스가 능력치에 반영된다."},
  {id:264,name:"FA",full:"FREE AGENT",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/fa.png",cat:"special",desc:"소속팀 없이 프리 에이전트 상태였던 선수들의 활약을 기리는 클래스. 계약 만료 후 새 팀을 찾기 전 뛰어난 기량을 보여준 선수들이 포함된다."},
  {id:256,name:"BTB",full:"Back to Back",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/btb.png",cat:"special",desc:"리그 2연패 이상을 달성한 구단의 핵심 선수들로 구성된 백 투 백 클래스. 연속 우승의 위대한 업적을 기리는 테마로, 해당 시기 최고의 컨디션을 반영한 능력치가 부여된다."},
  {id:252,name:"CAP",full:"Captain",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/cap.png",cat:"special",desc:"각 국가대표팀 또는 클럽의 캡틴(주장)을 역임한 선수들로 구성된 클래스. 리더십과 실력을 겸비한 선수들에게 높은 능력치가 부여되며, 커맨더 특성 등 주장에 어울리는 고유 특성이 포함된다."},
  {id:251,name:"EBS",full:"European Best Stars",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/ebs.png",cat:"special",desc:"유럽에서 활약한 최고의 스타 선수들로 구성된 클래스. 유럽 5대리그를 중심으로 뛰어난 활약을 펼친 선수들의 프리미엄 능력치가 부여된다."},
  {id:253,name:"BOE21",full:"Best of Europe 21",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/boe21.png",cat:"special",desc:"유로 2020(2021년 개최)에서 뛰어난 활약을 보인 유럽 최고의 선수들로 구성된 클래스."},
  {id:249,name:"NTG",full:"Nostalgia",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/ntg.png",cat:"special",desc:"과거 향수를 불러일으키는 레트로 감성의 선수들로 구성된 클래스. 은퇴 후 잊혀졌지만 한 시대를 풍미했던 선수들을 재조명하는 테마이다."},
  {id:246,name:"UP",full:"Unsung Players",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/up.png",cat:"special",desc:"팀 내에서 묵묵히 헌신했지만 빛을 보지 못한 언성 히어로 선수들로 구성된 클래스. 화려하지 않지만 팀에 꼭 필요했던 선수들의 공로를 재조명하는 테마이다."},
  {id:237,name:"MC",full:"Multi-League Champions",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/mc.png",cat:"special",desc:"여러 리그에서 우승을 경험한 멀티 리그 챔피언 선수들로 구성된 클래스. 2개 이상의 주요 리그에서 우승한 선수들이 포함되며, 높은 능력치와 다양한 팀컬러 혜택이 특징이다."},
  {id:231,name:"VTR",full:"Veteran",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/vtr.png",cat:"special",desc:"한 클럽에서 오랜 기간 헌신한 베테랑 선수들로 구성된 클래스. 충성심 높은 원클럽맨이나 장기 복무 선수들의 공로를 기리는 테마이다."},
  {id:233,name:"MOG",full:"Moments Of Glory",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/mog.png",cat:"special",desc:"리그 우승에 기여한 영광스러운 선수들로 구성된 클래스. 레스터 시티의 깜짝 우승, 리버풀의 30년 만의 우승 등 극적인 우승의 주역들이 포함되어 있다. 필기체 글씨와 트로피 아이콘 등 디자인이 호평받았다."},
  {id:218,name:"OTW",full:"Ones To Watch",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/otw.png",cat:"special",desc:"2019 여름 이적시장에서 주목받은 선수들로 구성된 클래스. 3개월간 이 달의 선수 선정 시 급여 변동 없이 OVR이 영구 1 상승하는 시스템이 특징이었다. 현재는 거의 사용되지 않는다."},
  {id:217,name:"COC",full:"Competitor Of Continents",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/coc.png",cat:"special",desc:"유럽, 북중미, 남미, 아프리카 대륙컵에서 활약한 선수들 281명으로 구성된 클래스. 급하게 출시되었다는 평가를 받았으며, 버질 반다이크를 제외하면 수요가 거의 없는 비인기 클래스이다."},
  {id:216,name:"HOT",full:"Heroes Of the Team",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/hot.png",cat:"special",desc:"세계 주요 리그의 클럽별 레전드 선수들로 이루어진 클래스. ICON보다는 못하지만 높은 능력치와 급여로 구성된다. 굴리트·호나우두가 98 오버롤을 받아 화제가 되었으며, LH 출시 전까지 핵심 클래스였다."},
  {id:214,name:"TC",full:"Tournament Champions",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/tc.png",cat:"special",desc:"유럽 클럽 대항전(UEFA 챔피언스 리그) 4강 이상 진출 경력을 가진 선수들로 구성된 클래스. 챔스 활약 당시의 신장·체중·약발·개인기를 그대로 반영한 것이 특징이다. 스티븐 제라드, 프랭크 램파드 등이 처음 출시되었다."},
  {id:210,name:"GR",full:"Golden Rookies",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/gr.png",cat:"special",desc:"유럽에서 뛰는 젊은 선수들 중 가장 뛰어난 유망주로 평가받았던 선수들로 구성된 클래스. 골든보이 수상자와 후보들이 대거 출시되었으며, 전성기 기량을 바탕으로 능력치가 설정되었다."},
  {id:207,name:"TT",full:"Top Transfer",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/tt.png",cat:"special",desc:"과거 이적 당시 이적료, 이적 전 활약, 이적 자체의 파급력 등이 복합적으로 반영된 클래스. 호나우두, 굴리트, 레이카르트 등 FC 온라인의 '적폐' 선수를 만든 클래스로 유명하다. 고성능 고급여 원칙을 깨뜨려 논란이 되었다."},
  {id:206,name:"TB",full:"Tournament Best",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/tb.png",cat:"special",desc:"유럽 클럽 대항전, 세계 국가 대항전에서 활약한 선수들이 반영된 클래스. NHD와 LIVE의 중간 정도 성능이며, 중저급여 골키퍼 맛집으로 유명했다. 현재는 미니 페이스온도 없어 거의 사용되지 않는다."},
  {id:291,name:"23HW",full:"23 Hard Worker",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/23hw.png",cat:"special",desc:"23시즌 하드 워커 클래스. 경기장에서 누구보다 열심히 뛰며 팀을 위해 헌신한 선수들로 구성된다. 높은 스태미너와 적극성이 특징이다."},

  {id:801,name:"JVA",full:"Juventus Ambassador",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/jva.png",cat:"ambassador",desc:"유벤투스 FC 앰버서더 클래스. 유벤투스 역사를 빛낸 레전드 선수들로 구성되며, EA와의 독점 라이선스 계약을 기반으로 출시되었다."},
  {id:290,name:"FCA",full:"FCAmbassador",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/fca.png",cat:"ambassador",desc:"FC 온라인의 공식 앰버서더로 선정된 선수들의 클래스. EA SPORTS FC 브랜드 전환을 기념해 출시되었다."},
  {id:274,name:"RMCF",full:"Real Madrid Ambassador",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/rmcf.png",cat:"ambassador",desc:"레알 마드리드에서 4년 이상 활약하면서 우승을 경험한 선수들로 구성된 앰버서더 클래스. 지단, 푸스카스, 피구, 라울, 베컴 등 갈락티코스 멤버들이 대거 포함되어 있다."},
  {id:254,name:"CFA",full:"Chelsea FC Ambassador",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/cfa.png",cat:"ambassador",desc:"첼시 FC 앰버서더 클래스. 졸라, 램파드, 드로그바, 조 콜 등 첼시 레전드들로 구성되며, ICON 급에 근접하는 성능으로 '첼레알' 스쿼드의 핵심이 되었다."},
  {id:236,name:"LA",full:"Liverpool Ambassador",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/la.png",cat:"ambassador",desc:"리버풀 FC 앰버서더 클래스. 리버풀의 전설적인 7명의 실제 앰버서더(제라드, 달글리시, 오언 등)로 구성되며, 3명 이상 포함 시 스태미너·적극성 특성 팀컬러가 적용된다."},
  {id:213,name:"MCFC ICON",full:"Man City ICON",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/mcicon.png",cat:"ambassador",desc:"맨체스터 시티 FC의 역사적인 레전드 선수들로 구성된 클래스. 유저들에게 생소한 선수가 많았지만, 맨시티 팀컬러 유저들에게 중요한 클래스이다."},
  {id:297,name:"MCFC",full:"17-18 Man City Champions",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/mcfc.png",cat:"ambassador",desc:"2017-18 맨체스터 시티 챔피언 클래스입니다. 역사적인 100포인트 프리미어리그 우승 시즌의 핵심 선수들로 구성됩니다."},

  {id:234,name:"LH",full:"Loyal Heroes",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/lh.png",cat:"korea",desc:"국가대표로서 수많은 A매치 출전과 좋은 활약을 보인 선수들로 구성된 클래스. 저급여 고성능으로 출시되어 역대 최고의 가성비/급성비 클래스로 평가받았다. 지단, 드로그바 등 보급형 레전드가 대거 등장해 구단 가치 대폭락을 야기했다."},
  {id:225,name:"TKL",full:"TEAM K LEAGUE",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/tkl.png",cat:"korea",desc:"대한민국 K리그에서 수많은 활약을 보인 선수들로 구성된 클래스. 이동국, 홍명보, 유상철, 데얀 등 K리그 레전드들이 높은 능력치와 양발잡이로 출시되어 대한민국 팀컬러의 핵심이 되었다."},
  {id:202,name:"TKI",full:"Team Korea Icon",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/tki.png",cat:"korea",desc:"한국의 전설급 선수들이 모여있는 클래스. 박지성, 홍명보, 차범근, 황선홍 등 한국 축구 역사를 빛낸 레전드들로 구성된다. 이후 출시된 LH, TKL 등에 밀려 현재는 주로 감성용으로 사용된다."},
  {id:201,name:"NHD",full:"National Hero Debut",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/nhd.png",cat:"korea",desc:"세계 국가대항전에서 각 나라를 대표해 데뷔한 선수들로 구성된 클래스. FC 온라인 초기 출시된 고급 클래스로, TT 클래스 출시 이전까지 대장급 선수들의 핵심 클래스였다."},
  {id:247,name:"2012 KH",full:"2012 KH",img:"https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/2012kh.png",cat:"korea",desc:"2012 런던 올림픽 축구 동메달을 달성한 대한민국 대표팀 레전드 멤버 18명으로 구성된 클래스. 박주영과 지동원이 높은 능력치·양발로 출시되어 대한민국 팀컬러를 1티어로 끌어올렸다."},

function getDate(id) {
  return RELEASE_DATES[id] || null;
}

function formatDate(d) {
  if (!d) return "";
  const [y, m] = d.split("-");
  return `${y}년 ${parseInt(m)}월`;
}

function isNew(d) {
  if (!d) return false;
  const now = new Date();
  const sixMonthsAgo = new Date(now.getFullYear(), now.getMonth() - 6, 1);
  const [y, m] = d.split("-").map(Number);
  const classDate = new Date(y, m - 1, 1);
  return classDate >= sixMonthsAgo;
}

function filterItems(items, filter) {
  if (!filter) return items;
  const q = filter.toLowerCase();
  return items.filter(c =>
    c.name.toLowerCase().includes(q) || c.full.toLowerCase().includes(q) || c.desc.toLowerCase().includes(q)
  );
}

function cardHTML(c) {
  const d = getDate(c.id);
  const dateStr = formatDate(d);
  const newTag = isNew(d) ? '<span class="new-badge">NEW</span>' : '';
  return `
    <div class="class-card" data-cid="${c.id}" onclick="openDetail(${c.id})" style="cursor:pointer">
      <img src="${c.img}" alt="${c.name}" loading="lazy" onerror="this.style.opacity='0.3'">
      <div class="class-name">${c.name}${newTag}</div>
      <div class="class-full">${c.full}</div>
      ${dateStr ? `<div class="class-date">${dateStr} 출시</div>` : ''}
    </div>`;
}

function openDetail(id) {
  const c = CLASS_DATA.find(x => x.id === id);
  if (!c) return;
  const d = getDate(c.id);
  const dateStr = formatDate(d);
  const cat = CATEGORIES.find(x => x.key === c.cat);

  document.getElementById("modalImg").src = c.img;
  document.getElementById("modalName").innerHTML = c.name + (isNew(d) ? ' <span class="new-badge">NEW</span>' : '');
  document.getElementById("modalFull").textContent = c.full;
  document.getElementById("modalDate").textContent = dateStr ? dateStr + ' 출시' : '';
  document.getElementById("modalDesc").textContent = c.desc;
  document.getElementById("modalId").textContent = c.id;
  document.getElementById("modalCat").textContent = cat ? cat.name.split('(')[0].trim() : c.cat;
  document.getElementById("modalDateMeta").textContent = dateStr || '-';

  const modal = document.getElementById("detailModal");
  modal.classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeDetail() {
  const modal = document.getElementById("detailModal");
  modal.classList.remove("open");
  document.body.style.overflow = "";
}

document.getElementById("detailModal").addEventListener("click", function(e) {
  if (e.target === this) closeDetail();
});
document.getElementById("modalClose").addEventListener("click", closeDetail);
document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") closeDetail();
});

let currentSort = "category";

function renderCategory(filter) {
  const container = document.getElementById("classContainer");
  const noResults = document.getElementById("noResults");
  container.innerHTML = "";
  let totalVisible = 0, visibleCats = 0;

  CATEGORIES.forEach(cat => {
    const items = filterItems(CLASS_DATA.filter(c => c.cat === cat.key), filter);
    if (items.length === 0) return;
    visibleCats++;
    totalVisible += items.length;
    const section = document.createElement("div");
    section.className = "category";
    section.innerHTML = `
      <div class="category-header">
        <div class="category-dot" style="background:${cat.color};box-shadow:0 0 8px ${cat.color}"></div>
        <h2>${cat.name}<span class="count">${items.length}개</span></h2>
      </div>
      <div class="class-grid">${items.map(cardHTML).join("")}</div>`;
    container.appendChild(section);
  });

  document.getElementById("totalCount").textContent = filter ? totalVisible : CLASS_DATA.length;
  document.getElementById("catCount").textContent = filter ? visibleCats : CATEGORIES.length;
  noResults.style.display = totalVisible === 0 ? "block" : "none";
}

function renderByDate(filter) {
  const container = document.getElementById("classContainer");
  const noResults = document.getElementById("noResults");
  container.innerHTML = "";

  const items = filterItems([...CLASS_DATA], filter);
  items.sort((a, b) => {
    const da = getDate(a.id) || "2018-01";
    const db = getDate(b.id) || "2018-01";
    return db.localeCompare(da);
  });

  const groups = {};
  items.forEach(c => {
    const d = getDate(c.id);
    const key = d ? d.substring(0, 4) : "기타";
    if (!groups[key]) groups[key] = [];
    groups[key].push(c);
  });

  const sortedYears = Object.keys(groups).sort((a, b) => b.localeCompare(a));
  let totalVisible = 0;

  sortedYears.forEach(year => {
    const yearItems = groups[year];
    totalVisible += yearItems.length;
    const section = document.createElement("div");
    section.className = "date-sort-section";
    section.innerHTML = `
      <div class="date-group-header">
        <h2>${year === "기타" ? "출시일 미상" : year + "년"}</h2>
        <span class="group-count">${yearItems.length}개</span>
      </div>
      <div class="class-grid">${yearItems.map(cardHTML).join("")}</div>`;
    container.appendChild(section);
  });

  document.getElementById("totalCount").textContent = totalVisible;
  document.getElementById("catCount").textContent = sortedYears.length;
  noResults.style.display = totalVisible === 0 ? "block" : "none";
}

function render(filter = "") {
  if (currentSort === "date") renderByDate(filter);
  else renderCategory(filter);
}

document.querySelectorAll(".sort-tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".sort-tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    currentSort = tab.dataset.sort;
    render(document.getElementById("searchInput").value.trim());
  });
});

document.getElementById("searchInput").addEventListener("input", e => {
  render(e.target.value.trim());
});

const KNOWN_CAT_MAP = {
  icon:{prefix:["icon","im"],range:[100,119]},
  toty:{keywords:["toty","totn"]},
  tots:{keywords:["tots"]},
  ucl:{keywords:["ucl"]},
  hero:{keywords:["hero","hr"]},
  ng:{keywords:["ng","new gen"]},
  kfa:{keywords:["kfa"]},
  kleague:{keywords:["kleague","kl","k-league","klb","kb"]},
  pl:{keywords:["premium","pla","pls","plc"]},
  live:{keywords:["live"],range:[300,399]}
};

function guessCategory(id, name, fullName) {
  const n = (name + " " + fullName).toLowerCase();
  if (id >= 100 && id <= 119) return "icon";
  if (id >= 300 && id <= 399) return "live";
  if (id >= 500 && id <= 519) {
    if (n.includes("premium") || n.includes("pl")) return "pl";
    if (n.includes("kleague") || n.includes("kl")) return "kleague";
  }
  if (n.includes("toty") || n.includes("team of the year")) return "toty";
  if (n.includes("totn") || n.includes("nominated")) return "toty";
  if (n.includes("tots") || n.includes("team of the season")) return "tots";
  if (n.includes("ucl") || n.includes("champions league")) return "ucl";
  if (n.includes("hero")) return "hero";
  if (n.includes("ng") || n.includes("new gen")) return "ng";
  if (n.includes("kfa")) return "kfa";
  if (n.includes("kleague") || n.includes("k-league") || n.includes("klb")) return "kleague";
  if (n.includes("premium") || n.includes("pla") || n.includes("pls")) return "pl";
  if (n.includes("live")) return "live";
  if (n.includes("ambassador") || n.includes("ambs")) return "ambassador";
  return "special";
}

async function checkForUpdates() {
  try {
    const res = await fetch("https://open.api.nexon.com/static/fconline/meta/seasonid.json");
    if (!res.ok) return;
    const apiData = await res.json();
    const existingIds = new Set(CLASS_DATA.map(c => c.id));
    const newClasses = [];

    apiData.forEach(item => {
      const id = item.seasonId;
      if (!existingIds.has(id)) {
        const imgName = item.seasonImg;
        newClasses.push({
          id,
          name: item.className,
          full: item.className,
          img: `https://ssl.nexon.com/s2/game/fc/online/obt/externalAssets/new/season/${imgName}`,
          cat: guessCategory(id, item.className, item.className),
          desc: "신규 클래스입니다."
        });
        const today = new Date();
        const ym = today.getFullYear() + "-" + String(today.getMonth() + 1).padStart(2, "0");
        RELEASE_DATES[id] = ym;
      }
    });

    if (newClasses.length > 0) {
      newClasses.forEach(c => CLASS_DATA.push(c));
      const banner = document.getElementById("updateBanner");
      banner.textContent = `✨ 신규 클래스 ${newClasses.length}개가 감지되어 자동 추가되었습니다: ${newClasses.map(c => c.name).join(", ")}`;
      banner.style.display = "block";
      render(document.getElementById("searchInput").value.trim());
    }
  } catch (e) {}
}

render();
checkForUpdates();
